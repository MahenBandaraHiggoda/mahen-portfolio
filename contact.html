<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mahen D Higgoda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-card inner-page" aria-label="Contact">
      <header class="navbar">
        <a class="brand" href="index.html">Mahen.</a>

        <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="nav-links" aria-label="Main navigation">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="services.html">Services</a>
          <a href="skills.html">Skills</a>
          <a href="portfolio.html">Projects</a>
          <a class="active" href="contact.html">Contact</a>
        </nav>
      </header>

      <div class="page-content two-column">
        <div>
          <p class="eyebrow">Contact</p>
          <h1>Have a project in mind?</h1>
          <p class="intro page-intro">
            Send a message and I will get back to you about your website, app, or portfolio idea.
          </p>
          <div class="contact-details">
            <a href="mailto:mhiggoda@gmail.com">mhiggoda@gmail.com</a>
          </div>
        </div>

        <form class="contact-form" action="#" method="post">
          <label>
            Name
            <input type="text" name="name" placeholder="Your name">
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="your@email.com">
          </label>
          <label>
            Message
            <textarea name="message" rows="5" placeholder="Tell me about your project"></textarea>
          </label>
          <button class="btn primary" type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
